apiVersion: apps/v1
kind: Deployment
metadata:
  name: bbms-be
  namespace: prod
spec:
  replicas: 2
  selector:
    matchLabels:
      app: bbms-be
  template:
    metadata:
      labels:
        app: bbms-be
    spec:
      imagePullSecrets:
        - name: regcred
      containers:
      - name: bbms-be
        image: bbms-be
        env:
        - name: MONGO_URI
          valueFrom:
            secretKeyRef:
              name: bbms-secret
              key: MONGO_URI
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: bbms-secret
              key: JWT_SECRET