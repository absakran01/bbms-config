apiVersion: apps/v1
kind: Deployment
metadata:
  name: bbms-be
  namespace: prod
spec:
  replicas: 2
  selector:
    matchLabels:
      app: bbms-be
  template:
    metadata:
      labels:
        app: bbms-be
    spec:

    # !!!! PRIVATE REGISTRY IS SUSPENDED FOR SECURITY REASONS. TURN IT ON WHEN YOU HAVE TO RESYNC THEN TURN OFF AGAIN. !!!!
      containers:
      - name:  absakran01-registry.onrender.com/bbms-be:latest  
        image: bbms-be
        env:
        - name: MONGO_URI
          valueFrom:
            secretKeyRef:
              name: bbms-secret
              key: MONGO_URI
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: bbms-secret
              key: JWT_SECRET